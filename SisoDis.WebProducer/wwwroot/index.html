<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISO DIS Web Producer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>SISO DIS Web Producer</h1>
            <div class="status-badge" id="statusBadge">Stopped</div>
        </header>

        <main>
            <section class="control-panel">
                <div class="card">
                    <h2>Entity Settings</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="entityId">Entity ID</label>
                            <input type="number" id="entityId" value="1" min="1">
                        </div>
                        <div class="form-group">
                            <label for="pattern">Movement Pattern</label>
                            <select id="pattern">
                                <option value="Linear">Linear</option>
                                <option value="Stationary">Stationary</option>
                                <option value="Circle">Circle</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="speed">Speed (m/s)</label>
                            <input type="number" id="speed" value="10" min="0">
                        </div>
                        <div class="form-group">
                            <label for="rate">Rate (Hz)</label>
                            <input type="number" id="rate" value="5" min="1" max="60">
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="addEntity()">Add Entity</button>
                </div>

                <div class="card">
                    <h2>Network Settings</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="multicast">Multicast Address</label>
                            <input type="text" id="multicast" value="239.255.0.1">
                        </div>
                        <div class="form-group">
                            <label for="port">Port</label>
                            <input type="number" id="port" value="3000" min="1024" max="65535">
                        </div>
                    </div>
                    <button class="btn btn-secondary" onclick="updateConfig()">Update Config</button>
                </div>

                <div class="card actions">
                    <h2>Simulation Control</h2>
                    <div class="button-group">
                        <button class="btn btn-success btn-lg" id="startBtn" onclick="startSimulation()">
                            <span class="icon">&#9654;</span> Start
                        </button>
                        <button class="btn btn-danger btn-lg" id="stopBtn" onclick="stopSimulation()" disabled>
                            <span class="icon">&#9632;</span> Stop
                        </button>
                    </div>
                    <div class="button-group">
                        <button class="btn btn-warning" onclick="sendStartPdu()">Start/Resume</button>
                        <button class="btn btn-warning" onclick="sendStopPdu()">Stop/Freeze</button>
                    </div>
                </div>
            </section>

            <section class="entities-panel">
                <div class="card">
                    <div class="card-header">
                        <h2>Active Entities</h2>
                        <span class="badge" id="entityCount">0</span>
                    </div>
                    <div class="entity-list" id="entityList">
                        <div class="empty-state">No entities added yet</div>
                    </div>
                </div>
            </section>

            <section class="log-panel">
                <div class="card">
                    <div class="card-header">
                        <h2>PDU Log</h2>
                        <button class="btn btn-small" onclick="clearLog()">Clear</button>
                    </div>
                    <div class="log-list" id="logList">
                        <div class="empty-state">No activity yet</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
