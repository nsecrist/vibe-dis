<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISO DIS Web Receiver</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>SISO DIS Web Receiver</h1>
            <div class="status-badge" id="statusBadge">Stopped</div>
        </header>

        <main>
            <section class="control-panel">
                <div class="card">
                    <h2>Network Settings</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="multicast">Multicast Address</label>
                            <input type="text" id="multicast" value="239.255.0.1">
                        </div>
                        <div class="form-group">
                            <label for="port">Port</label>
                            <input type="number" id="port" value="3000" min="1024" max="65535">
                        </div>
                    </div>
                    <button class="btn btn-secondary" onclick="updateConfig()">Update Config</button>
                </div>

                <div class="card actions">
                    <h2>Receiver Control</h2>
                    <div class="button-group">
                        <button class="btn btn-success btn-lg" id="startBtn" onclick="startReceiver()">
                            <span class="icon">&#9654;</span> Start
                        </button>
                        <button class="btn btn-danger btn-lg" id="stopBtn" onclick="stopReceiver()" disabled>
                            <span class="icon">&#9632;</span> Stop
                        </button>
                    </div>
                </div>

                <div class="card stats">
                    <h2>Statistics</h2>
                    <div class="stat-grid">
                        <div class="stat-item">
                            <span class="stat-value" id="totalReceived">0</span>
                            <span class="stat-label">PDUs Received</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="totalBytes">0</span>
                            <span class="stat-label">Bytes</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="log-panel">
                <div class="card">
                    <div class="card-header">
                        <h2>PDU Log</h2>
                        <div>
                            <button class="btn btn-small" onclick="clearLog()">Clear</button>
                        </div>
                    </div>
                    <div class="log-list" id="logList">
                        <div class="empty-state">No PDUs received yet</div>
                    </div>
                </div>
            </section>

            <section class="types-panel">
                <div class="card">
                    <h2>Supported PDU Types</h2>
                    <div class="types-grid" id="typesGrid"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
